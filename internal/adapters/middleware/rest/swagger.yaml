basePath: /api
definitions:
  rest.ServerInfo:
    properties:
      version:
        description: The server version
        type: string
    type: object
  rest.SessionInfo:
    properties:
      strong_auth:
        type: boolean
    type: object
host: localhost:9123
info:
  contact:
    url: https://github.com/tdrn-org/idpd
  description: IdPD identity provider server API.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: IdPD REST API
  version: "1.0"
paths:
  /api/info:
    get:
      description: Retrieve basic server info like version and configured options
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ServerInfo'
        "500":
          description: server error
          schema:
            type: string
      summary: Query server info
  /api/ping:
    get:
      description: Ping the server to check general health
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Ping the server
  /api/session:
    get:
      description: Retrieve the current session information (if a session exists)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.SessionInfo'
        "404":
          description: no session found
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Get current session
    post:
      description: Deletes the current session (if a session exists)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.SessionInfo'
        "404":
          description: no session found
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Delete the current session
  /api/session/login:
    get:
      description: Retrieve the current session information (if a session exists)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.SessionInfo'
        "404":
          description: no session found
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Get current session
    post:
      description: Initiate the authentication flow to create a new session
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to Login UI
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Create a new session
  /api/session/verify:
    get:
      description: Retrieve the current session information (if a session exists)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.SessionInfo'
        "404":
          description: no session found
          schema:
            type: string
        "500":
          description: server error
          schema:
            type: string
      summary: Get current session
swagger: "2.0"
